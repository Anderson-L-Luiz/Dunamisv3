<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dunamis v3 — Gemini chat</title>
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --panel2:#1e222b; --line:#2a2f3a;
    --text:#e6e9ef; --muted:#9aa4b2; --accent:#7c9cff; --accent2:#4d6bff;
    --user:#243049; --bot:#1b1f28; --err:#3a1d22; --ok:#1e3a2a;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--text);
    font:15px/1.5 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    display:flex;flex-direction:column;height:100vh}
  header{display:flex;align-items:center;gap:12px;padding:10px 14px;
    background:var(--panel);border-bottom:1px solid var(--line);flex:0 0 auto}
  header h1{font-size:15px;margin:0;font-weight:650;letter-spacing:.3px}
  header .dot{width:9px;height:9px;border-radius:50%;background:#e0574b;display:inline-block;margin-right:6px}
  header .dot.ok{background:#37d67a}
  header .spacer{flex:1}
  select,button,input[type=text]{font:inherit;color:var(--text)}
  select{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:6px 8px}
  button{background:var(--panel2);border:1px solid var(--line);border-radius:8px;
    padding:6px 12px;cursor:pointer}
  button:hover{border-color:var(--accent)}
  button.primary{background:var(--accent2);border-color:var(--accent2);color:#fff;font-weight:600}
  button:disabled{opacity:.5;cursor:not-allowed}
  #status{font-size:12.5px;color:var(--muted)}
  #banner{display:none;padding:10px 14px;background:#2a2233;color:#ffd9a8;
    border-bottom:1px solid var(--line);font-size:13.5px}
  #banner.show{display:block}
  main{flex:1 1 auto;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:14px}
  .msg{max-width:820px;width:fit-content;padding:10px 14px;border-radius:14px;white-space:pre-wrap;
    word-wrap:break-word;overflow-wrap:anywhere}
  .msg.user{align-self:flex-end;background:var(--user);border:1px solid #2f3d5c}
  .msg.bot{align-self:flex-start;background:var(--bot);border:1px solid var(--line)}
  .msg.err{align-self:flex-start;background:var(--err);border:1px solid #6b2b34;color:#ffb4bd}
  .msg .thumbs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
  .msg .thumbs img{max-height:150px;max-width:220px;border-radius:8px;border:1px solid var(--line)}
  .msg .who{font-size:11px;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}
  .msg.bot.streaming::after{content:'▍';color:var(--accent);animation:blink 1s steps(2) infinite}
  @keyframes blink{50%{opacity:0}}
  footer{flex:0 0 auto;border-top:1px solid var(--line);background:var(--panel);padding:10px 14px}
  #tray{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
  #tray .chip{position:relative}
  #tray img{height:56px;width:56px;object-fit:cover;border-radius:8px;border:1px solid var(--line)}
  #tray .x{position:absolute;top:-7px;right:-7px;background:#000;border:1px solid var(--line);
    color:#fff;border-radius:50%;width:20px;height:20px;line-height:17px;text-align:center;cursor:pointer;font-size:12px}
  .composer{display:flex;gap:10px;align-items:flex-end}
  #input{flex:1;min-height:44px;max-height:200px;resize:none;background:var(--panel2);
    color:var(--text);border:1px solid var(--line);border-radius:12px;padding:11px 12px;font:inherit;outline:none}
  #input:focus{border-color:var(--accent)}
  #input.drag{border-color:var(--accent);background:#20263a}
  .hint{font-size:11.5px;color:var(--muted);margin-top:6px}
  .iconbtn{padding:9px 11px}
</style>
</head>
<body>
  <header>
    <h1>🐟 Dunamis v3</h1>
    <select id="model" title="Model">
      <option value="flash">Flash (fast)</option>
      <option value="pro">Pro (smart)</option>
      <option value="thinking">Thinking</option>
    </select>
    <span class="spacer"></span>
    <span id="status"><span class="dot" id="dot"></span><span id="statustext">checking…</span></span>
    <button id="loginbtn" title="Sign in to your Google account">Log in</button>
    <button id="newbtn" title="Start a fresh conversation">New chat</button>
  </header>
  <div id="banner"></div>
  <main id="messages"></main>
  <footer>
    <div id="tray"></div>
    <div class="composer">
      <button class="iconbtn" id="attachbtn" title="Attach image">📎</button>
      <input type="file" id="file" accept="image/*" multiple hidden />
      <textarea id="input" placeholder="Message Gemini…  (paste an image with Ctrl+V, or drag one in)"></textarea>
      <button class="primary" id="send">Send</button>
    </div>
    <div class="hint">Enter to send · Shift+Enter for newline · Ctrl+V / drag / 📎 to attach images</div>
  </footer>

<script>
const $ = s => document.querySelector(s);
const messagesEl = $("#messages"), inputEl = $("#input"), trayEl = $("#tray");
const state = { model: "flash", history: [], attachments: [] };
let loggedIn = false, busy = false;

$("#model").addEventListener("change", e => state.model = e.target.value);

// ---------- status / login ----------
async function refreshStatus(){
  try{
    const r = await fetch("/status"); const d = await r.json();
    loggedIn = !!d.logged_in;
    $("#dot").className = "dot" + (loggedIn ? " ok" : "");
    $("#statustext").textContent = loggedIn
      ? ("ready · " + (d.impersonation||"") ) : "not logged in";
    banner(loggedIn ? "" : "Not logged into Google. Click “Log in”, sign in to your Google account in the window that opens, then come back.");
  }catch(e){ $("#statustext").textContent = "server offline"; }
}
function banner(msg){ const b=$("#banner"); b.textContent=msg; b.className = msg ? "show":""; }

$("#loginbtn").addEventListener("click", async ()=>{
  $("#loginbtn").disabled = true;
  banner("A sign-in window is opening on the computer running Dunamis. Sign in there. "
       + "If it closes right away, you were already signed in — you're good to go. This page updates automatically.");
  try{ fetch("/login", {method:"POST"}); }catch(e){}
  // poll for readiness (login can take a couple of minutes)
  for(let i=0;i<150;i++){ await new Promise(r=>setTimeout(r,2000)); await refreshStatus(); if(loggedIn) break; }
  $("#loginbtn").disabled = false;
  if(loggedIn) banner("");
});

$("#newbtn").addEventListener("click", async ()=>{
  state.history = []; messagesEl.innerHTML=""; state.attachments=[]; renderTray();
  try{ await fetch("/v1/chat/new",{method:"POST"}); }catch(e){}
});

// ---------- attachments ----------
function addImage(file){
  if(!file || !file.type.startsWith("image/")) return;
  const reader = new FileReader();
  reader.onload = () => { state.attachments.push({name:file.name||"pasted", url:reader.result}); renderTray(); };
  reader.readAsDataURL(file);
}
function renderTray(){
  trayEl.innerHTML = "";
  state.attachments.forEach((a,i)=>{
    const c=document.createElement("div"); c.className="chip";
    const img=document.createElement("img"); img.src=a.url; img.title=a.name||"";
    const x=document.createElement("span"); x.className="x"; x.dataset.i=i; x.textContent="×";
    c.appendChild(img); c.appendChild(x);
    trayEl.appendChild(c);
  });
}
trayEl.addEventListener("click", e=>{
  if(e.target.classList.contains("x")){ state.attachments.splice(+e.target.dataset.i,1); renderTray(); }
});
$("#attachbtn").addEventListener("click", ()=> $("#file").click());
$("#file").addEventListener("change", e=>{ [...e.target.files].forEach(addImage); e.target.value=""; });

// Ctrl+V paste (the headline feature)
document.addEventListener("paste", e=>{
  const items = (e.clipboardData||{}).items||[];
  let had=false;
  for(const it of items){ if(it.type && it.type.startsWith("image/")){ addImage(it.getAsFile()); had=true; } }
  if(had) e.preventDefault();
});
// drag & drop
["dragenter","dragover"].forEach(ev=>inputEl.addEventListener(ev,e=>{e.preventDefault();inputEl.classList.add("drag");}));
["dragleave","drop"].forEach(ev=>inputEl.addEventListener(ev,e=>{e.preventDefault();inputEl.classList.remove("drag");}));
inputEl.addEventListener("drop", e=>{ [...(e.dataTransfer.files||[])].forEach(addImage); });

// ---------- rendering ----------
function bubble(cls, text, thumbs){
  const d=document.createElement("div"); d.className="msg "+cls;
  const who = cls==="user"?"you":(cls==="err"?"error":"gemini");
  const w=document.createElement("div"); w.className="who"; w.textContent=who; d.appendChild(w);
  if(thumbs && thumbs.length){
    const t=document.createElement("div"); t.className="thumbs";
    thumbs.forEach(u=>{ const im=document.createElement("img"); im.src=u; t.appendChild(im); });
    d.appendChild(t);
  }
  const span=document.createElement("span"); span.textContent=text||""; d.appendChild(span);
  messagesEl.appendChild(d); messagesEl.scrollTop=messagesEl.scrollHeight;
  return {el:d, span};
}

// ---------- send + stream ----------
inputEl.addEventListener("keydown", e=>{
  if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); send(); }
});
$("#send").addEventListener("click", send);

async function send(){
  if(busy) return;
  const text = inputEl.value.trim();
  const atts = state.attachments.slice();
  if(!text && !atts.length) return;

  // build OpenAI content
  let content;
  if(atts.length){
    content = [{type:"text", text: text || "Describe this image."}];
    atts.forEach(a=> content.push({type:"image_url", image_url:{url:a.url}}));
  } else { content = text; }

  bubble("user", text, atts.map(a=>a.url));
  state.history.push({role:"user", content});
  inputEl.value=""; state.attachments=[]; renderTray();

  busy=true; $("#send").disabled=true;
  const bot = bubble("bot","",null); bot.el.classList.add("streaming");
  let full="";
  const ctrl = new AbortController();
  let idle;
  const resetIdle = ()=>{ clearTimeout(idle); idle = setTimeout(()=>ctrl.abort(), 110000); };
  try{
    resetIdle();
    const resp = await fetch("/v1/chat/completions",{
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({model:state.model, messages:state.history, stream:true}),
      signal: ctrl.signal
    });
    if(!resp.ok || !resp.body){ throw new Error("server error " + resp.status); }
    const reader = resp.body.getReader(); const dec=new TextDecoder(); let buf="";
    while(true){
      const {value,done}=await reader.read(); if(done) break;
      resetIdle();
      buf += dec.decode(value,{stream:true});
      const parts = buf.split("\n\n"); buf = parts.pop();
      for(const p of parts){
        const line = p.trim(); if(!line.startsWith("data:")) continue;
        const payload = line.slice(5).trim();
        if(payload==="[DONE]") continue;
        try{
          const j=JSON.parse(payload);
          if(j.error){ throw new Error(j.error); }
          const delta = (j.choices&&j.choices[0]&&j.choices[0].delta&&j.choices[0].delta.content)||"";
          if(delta){ full+=delta; bot.span.textContent=full; messagesEl.scrollTop=messagesEl.scrollHeight; }
        }catch(err){ if(err instanceof SyntaxError) continue; throw err; }
      }
    }
    bot.el.classList.remove("streaming");
    if(full){ state.history.push({role:"assistant", content: full}); }
    else { bot.span.textContent="(empty response)"; }
  }catch(e){
    bot.el.remove();
    let msg = String((e && (e.message||e.name)) || e);
    if(e && e.name==="AbortError") msg = "No response in time — the server may be busy, or your session expired. Try again, or click Log in.";
    else if(/failed to fetch|networkerror|load failed/i.test(msg)) msg = "Can't reach the server. Make sure Dunamis is running (Dunamis.bat), then reload this page.";
    bubble("err", msg);
    state.history.pop(); // drop the unanswered user turn
  }finally{
    clearTimeout(idle);
    busy=false; $("#send").disabled=false; inputEl.focus();
  }
}

refreshStatus(); setInterval(refreshStatus, 15000); inputEl.focus();
</script>
</body>
</html>
